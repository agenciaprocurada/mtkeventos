<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Open Day · MTK Eventos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Nunito+Sans:ital,opsz,wght@0,6..12,200;0,6..12,300;0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700;0,6..12,800;1,6..12,400&display=swap" rel="stylesheet">

<style>
  :root{
    --ink-0:#000000;
    --ink-1:#08060a;
    --ink-2:#120c14;
    --ink-3:#1c1420;
    --ink-line: rgba(212,175,106,.18);
    --gold:#d4af6a;       /* gold core */
    --gold-2:#b8884b;     /* gold deep */
    --gold-3:#f3dba0;     /* gold light */
    --cream:#f4ecd8;
    --paper:#ece3cc;
    --text:#efe6d0;
    --muted: rgba(239,230,208,.66);
    --muted-2: rgba(239,230,208,.42);
    --display: "Nunito Sans", "Helvetica Neue", Arial, sans-serif;
    --display-2: "Nunito Sans", sans-serif;
    --body: "Nunito Sans", "Helvetica Neue", Arial, sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family: var(--body);
    background:
      radial-gradient(1100px 700px at 78% 8%, rgba(212,175,106,.13), transparent 60%),
      radial-gradient(900px 600px at 10% 90%, rgba(212,175,106,.09), transparent 60%),
      linear-gradient(180deg, #060406 0%, #0b070d 60%, #07050a 100%);
    background-attachment: fixed;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    letter-spacing: .01em;
  }

  /* ---------- shared ---------- */
  .wrap{max-width:1240px;margin:0 auto;padding: 0 32px;}
  .eyebrow{
    font-family: var(--body);
    font-size:12px; letter-spacing: .42em; text-transform:uppercase;
    color: var(--gold);
    display:inline-flex; align-items:center; gap:14px;
  }
  .eyebrow::before, .eyebrow::after{
    content:""; height:1px; width:34px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .eyebrow.one::before{display:none}
  .eyebrow.one::after{display:none}
  h1,h2,h3{font-family: var(--display); font-weight: 800; letter-spacing: -.01em; margin:0;}
  h2{font-size: clamp(34px, 4.4vw, 56px); line-height: 1.05; letter-spacing: -.015em;}
  h3{font-size: clamp(20px, 1.8vw, 24px); line-height: 1.2; letter-spacing: -.005em;}
  p{line-height: 1.65; color: var(--muted);}

  .gold{color:var(--gold);}
  /* Títulos em branco/creme. Dourado fica em detalhes (eyebrow, ícones, separadores, números). */
  .title-light{ color: var(--cream); }
  .title-light em, .title-light .accent{
    color: var(--gold); font-style: normal; font-weight: 800;
  }
  .rule{
    display:flex; align-items:center; gap:14px; justify-content:center;
    color: var(--gold);
  }
  .rule::before, .rule::after{
    content:""; height:1px; flex:1; max-width:120px;
    background: linear-gradient(90deg, transparent, rgba(212,175,106,.55), transparent);
  }
  .diamond{
    width:8px; height:8px; transform: rotate(45deg);
    background: var(--gold);
    box-shadow: 0 0 12px rgba(212,175,106,.7);
  }

  /* ---------- top nav ---------- */
  nav.top{
    position:sticky; top:0; z-index:50;
    backdrop-filter: blur(10px) saturate(120%);
    background: linear-gradient(180deg, rgba(6,4,6,.85), rgba(6,4,6,.55));
    border-bottom: 1px solid rgba(212,175,106,.12);
  }
  nav.top .inner{
    display:flex; align-items:center; justify-content:space-between;
    height:78px;
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .brand img{height:42px; width:auto; filter: drop-shadow(0 0 12px rgba(212,175,106,.15));}
  .nav-links{display:flex; gap: 34px; align-items:center;}
  .nav-links a{
    color: var(--cream); text-decoration:none;
    font-size: 12.5px; letter-spacing: .22em; text-transform:uppercase;
    transition: color .25s ease;
  }
  .nav-links a:hover{color: var(--gold);}
  .nav-cta{
    font-family: var(--body); font-size:12.5px; letter-spacing:.22em; text-transform:uppercase;
    padding: 12px 22px;
    color:#0b070d; background: linear-gradient(180deg, var(--gold-3), var(--gold) 55%, var(--gold-2));
    border:none; cursor:pointer; font-weight:600;
    text-decoration:none;
    box-shadow: 0 12px 28px rgba(212,175,106,.22), inset 0 1px 0 rgba(255,255,255,.5);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .nav-cta:hover{transform: translateY(-1px); box-shadow: 0 18px 34px rgba(212,175,106,.34), inset 0 1px 0 rgba(255,255,255,.5);}
  @media (max-width: 820px){
    .nav-links{display:none}
  }

  /* ---------- hero ---------- */
  .hero{
    position:relative; overflow:hidden;
    height: 650px;
    max-height: 650px;
    display:flex; align-items:stretch;
    isolation:isolate;
  }
  /* Imagem de fundo — tamanho real, centralizada no hero */
  .hero-bg{
    position:absolute; inset:0; z-index:-2;
    background-color: #06040a;
    background-image: url('assets/hero-bg.webp');
    background-size: auto 100%;
    background-position: center center;
    background-repeat: no-repeat;
  }
  /* Fade preto na metade esquerda do hero para legibilidade do conteúdo */
  .hero::before{
    content:"";
    position:absolute; inset:0; z-index:-1; pointer-events:none;
    background:
      linear-gradient(90deg,
        rgba(4,3,6,1) 0%,
        rgba(4,3,6,1) 32%,
        rgba(4,3,6,.85) 45%,
        rgba(4,3,6,.35) 55%,
        rgba(4,3,6,0) 68%);
  }
  @media (max-width: 1100px){
    .hero-bg{background-position: center center; background-size: cover; opacity:.45;}
    .hero::before{
      background: linear-gradient(180deg, rgba(4,3,6,.65) 0%, rgba(4,3,6,.85) 100%);
    }
  }

  /* Bloco de conteúdo ocupa estritamente a metade esquerda do hero */
  .hero-left{
    position:relative;
    width: 50%;
    display:flex; align-items:center;
    padding-left: max(32px, calc((100vw - 1240px) / 2 + 32px));
    padding-right: 56px;
  }
  @media (max-width: 1100px){
    .hero-left{width: 100%; padding-right: 32px;}
  }

  .hero-content{
    position:relative;
    width: 100%;
    max-width: 520px;
    display:flex; flex-direction:column; align-items: flex-start;
  }

  /* Eyebrow do hero (linha só à direita) */
  .hero-eyebrow{
    font-family: var(--body);
    font-size: 11px; letter-spacing: .42em; text-transform:uppercase;
    color: var(--gold);
    display:inline-flex; align-items:center; gap:14px;
    margin-bottom: 28px;
  }
  .hero-eyebrow::before{
    content:""; width:8px; height:8px; background: var(--gold); transform: rotate(45deg);
    box-shadow: 0 0 10px rgba(212,175,106,.7);
  }
  .hero-eyebrow::after{
    content:""; height:1px; width:60px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  /* Logo OPEN DAY */
  .openday-mark{
    display:block;
    width: clamp(280px, 30vw, 380px);
    height: auto;
    margin: 0 0 22px;
    filter:
      brightness(0) invert(1)
      drop-shadow(0 8px 30px rgba(212,175,106,.22));
  }

  /* Tagline */
  .hero-tag{
    margin: 0 0 36px;
    font-family: var(--display);
    font-weight: 300;
    color: var(--cream);
    font-size: clamp(18px, 1.7vw, 22px);
    line-height: 1.4;
    letter-spacing: 0;
    max-width: 32ch;
  }
  .hero-tag em{color: var(--gold); font-style: normal; font-weight: 700;}

  /* Meta (Data | Horário) */
  .hero-meta{
    display:flex; align-items: stretch; gap: 28px;
    padding: 18px 0 22px;
    border-top: 1px solid rgba(212,175,106,.28);
    border-bottom: 1px solid rgba(212,175,106,.28);
    margin: 0 0 32px;
    width: 100%;
    max-width: 460px;
  }
  .meta-item{display:flex; flex-direction:column; gap:6px;}
  .meta-label{
    font-size: 10px; letter-spacing: .38em; text-transform:uppercase;
    color: var(--muted-2);
  }
  .meta-value{
    font-family: var(--display); font-weight: 700;
    font-size: 22px; color: var(--cream);
    letter-spacing: .02em;
  }
  .meta-value .sep{color: var(--gold); margin: 0 6px; font-weight: 400;}
  .meta-divider{
    width:1px; align-self: stretch;
    background: linear-gradient(180deg, transparent, rgba(212,175,106,.5), transparent);
  }

  .hero-cta{
    font-family: var(--body); font-size:12px; letter-spacing:.32em; text-transform:uppercase;
    padding: 18px 36px;
    color:#0b070d; font-weight:700; border:none; cursor:pointer;
    text-decoration:none; display:inline-block;
    background: linear-gradient(180deg, var(--gold-3), var(--gold) 55%, var(--gold-2));
    box-shadow: 0 14px 32px rgba(212,175,106,.32), inset 0 1px 0 rgba(255,255,255,.5);
    transition: transform .2s ease, box-shadow .25s ease;
  }
  .hero-cta:hover{transform: translateY(-2px); box-shadow: 0 20px 40px rgba(212,175,106,.42), inset 0 1px 0 rgba(255,255,255,.5);}

  /* v2 hero — logo + data/hora inline, headline e subheadline */
  .hero-mark-row{
    display:flex; align-items:center; gap: 22px;
    margin: 0 0 32px;
  }
  .openday-mark.sm{
    width: clamp(110px, 11vw, 140px);
    margin: 0;
    flex-shrink: 0;
  }
  .mark-divider{
    width:1px; align-self: stretch;
    background: linear-gradient(180deg, transparent, rgba(212,175,106,.5), transparent);
  }
  .hero-meta.inline{
    border: none; padding: 0; margin: 0;
    max-width: none;
    gap: 22px;
  }
  .hero-meta.inline .meta-value{font-size: 17px; letter-spacing: 0;}
  .hero-meta.inline .meta-label{font-size: 9.5px; letter-spacing: .32em;}

  .hero-headline{
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(32px, 3.4vw, 46px);
    line-height: 1.1;
    letter-spacing: -.015em;
    color: var(--cream);
    margin: 0 0 22px;
    max-width: 18ch;
  }
  .hero-headline em{color: var(--gold); font-style: normal; font-weight: 800;}
  .hero-sub{
    font-family: var(--body);
    font-size: 15px; line-height: 1.6;
    color: var(--muted);
    margin: 0 0 32px;
    max-width: 52ch;
  }

  @media (max-width: 720px){
    .hero-mark-row{flex-wrap: wrap; gap: 16px;}
    .mark-divider{display:none;}
    .hero-meta.inline{width: 100%;}
    .hero-headline{font-size: 28px;}
    .hero-sub{font-size: 14px;}
  }

  @media (max-width: 720px){
    .hero{height: 600px; max-height: 600px;}
    .openday-mark{width: clamp(220px, 60vw, 300px);}
    .hero-meta{gap: 20px; max-width: 100%;}
    .meta-value{font-size: 18px;}
  }

  .hero-copy{position:relative; z-index:2;}
  .hero-copy .eyebrow{margin-bottom:26px}

  .openday-title{
    font-family: var(--display);
    font-style: italic;
    font-weight: 500;
    line-height: .86;
    font-size: clamp(80px, 13vw, 180px);
    letter-spacing: -.01em;
    margin: 0 0 6px;
  }
  .openday-logo-img{
    display:block;
    width: clamp(240px, 32vw, 440px);
    height: auto;
    filter:
      brightness(0) invert(1)
      drop-shadow(0 8px 30px rgba(212,175,106,.18));
  }
  @media (max-width: 980px){
    .openday-logo-img{width: clamp(220px, 55vw, 380px);}
  }
  .openday-title .row{display:block;}
  .openday-title .row.day{margin-left: .18em;}
  .tag{
    font-family: var(--display);
    font-weight: 300;
    color: var(--cream);
    font-size: clamp(20px, 2vw, 26px);
    letter-spacing: 0;
    margin: 18px 0 38px;
    max-width: 32ch;
  }
  .tag em{color: var(--gold); font-style: normal; font-weight: 700;}
  .hero-meta{
    display:flex; gap:36px; flex-wrap:wrap;
    padding: 24px 0; margin: 6px 0 30px;
    border-top: 1px solid var(--ink-line);
    border-bottom: 1px solid var(--ink-line);
  }
  .hero-meta .item{display:flex; flex-direction:column; gap:6px;}
  .hero-meta .label{
    font-size: 10.5px; letter-spacing: .42em; text-transform:uppercase; color: var(--muted-2);
  }
  .hero-meta .value{
    font-family: var(--display); font-weight:700; font-size: clamp(22px, 2.2vw, 28px); color: var(--cream);
    letter-spacing: .02em;
  }
  .hero-meta .value .sep{color: var(--gold); margin: 0 8px; font-weight:300}

  .cta-row{display:flex; gap:16px; flex-wrap:wrap; align-items:center;}
  .btn{
    font-family: var(--body); font-size:12.5px; letter-spacing:.26em; text-transform:uppercase;
    padding: 18px 28px; border:none; cursor:pointer; font-weight:600;
    display:inline-flex; align-items:center; gap:14px;
    transition: transform .2s ease, box-shadow .25s ease, background .25s ease, color .2s ease;
  }
  .btn.primary{
    color:#0b070d;
    background: linear-gradient(180deg, var(--gold-3), var(--gold) 50%, var(--gold-2));
    box-shadow: 0 16px 38px rgba(212,175,106,.28), inset 0 1px 0 rgba(255,255,255,.55);
  }
  .btn.primary:hover{transform: translateY(-2px); box-shadow: 0 22px 44px rgba(212,175,106,.4), inset 0 1px 0 rgba(255,255,255,.55);}
  .btn.ghost{
    color: var(--cream); background: transparent;
    border: 1px solid rgba(212,175,106,.5);
  }
  .btn.ghost:hover{background: rgba(212,175,106,.08); border-color: var(--gold); color: var(--gold-3);}
  .btn .arr{width:18px; height:1px; background: currentColor; position:relative;}
  .btn .arr::after{content:""; position:absolute; right:0; top:-3px; width:8px; height:8px; border-top:1px solid currentColor; border-right:1px solid currentColor; transform: rotate(45deg);}

  /* ---------- hero visual ---------- */
  .hero-visual{
    position:relative; aspect-ratio: 4/5; max-height: 720px;
    border: 1px solid rgba(212,175,106,.22);
    overflow:hidden;
    background:
      radial-gradient(80% 70% at 40% 30%, rgba(35,55,120,.22), transparent 60%),
      radial-gradient(80% 70% at 70% 80%, rgba(212,175,106,.16), transparent 60%),
      linear-gradient(180deg, #06040a, #0b070d);
  }
  .hero-visual::before{ /* corner ornaments */
    content:""; position:absolute; inset:14px;
    border: 1px solid rgba(212,175,106,.22);
    pointer-events:none;
  }
  .hero-visual .corner{position:absolute; width:36px; height:36px; pointer-events:none;}
  .hero-visual .corner.tl{top:8px; left:8px; border-top:1px solid var(--gold); border-left:1px solid var(--gold);}
  .hero-visual .corner.tr{top:8px; right:8px; border-top:1px solid var(--gold); border-right:1px solid var(--gold);}
  .hero-visual .corner.bl{bottom:8px; left:8px; border-bottom:1px solid var(--gold); border-left:1px solid var(--gold);}
  .hero-visual .corner.br{bottom:8px; right:8px; border-bottom:1px solid var(--gold); border-right:1px solid var(--gold);}
  .hero-visual img.poster{
    width:100%; height:100%; object-fit: cover; object-position: 30% center;
    display:block; opacity:.92;
    -webkit-mask-image: linear-gradient(180deg, black 75%, transparent 100%);
            mask-image: linear-gradient(180deg, black 75%, transparent 100%);
  }
  .hero-visual .overlay-text{
    position:absolute; left:0; right:0; bottom: 36px;
    text-align:center; z-index:3;
  }
  .hero-visual .overlay-text .ornament{
    color: var(--gold); letter-spacing: .55em; font-size:11px; margin-bottom: 8px;
  }
  .hero-visual .overlay-text .who{
    font-family: var(--display); font-weight: 700; font-size: 20px; color: var(--cream);
  }

  /* sparkles */
  .sparkles{position:absolute; inset:0; pointer-events:none; z-index: 1;}
  .sparkle{
    position:absolute; width:3px; height:3px; border-radius:50%;
    background: var(--gold-3);
    box-shadow: 0 0 8px rgba(243,219,160,.9);
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:.15; transform: scale(.7)}
    50%{opacity:1; transform: scale(1.2)}
  }

  /* countdown */
  .countdown{
    display:flex; gap:14px; margin: 32px 0 0;
  }
  .cd{
    flex:1; text-align:center;
    padding: 18px 8px 14px;
    border: 1px solid rgba(212,175,106,.28);
    background: linear-gradient(180deg, rgba(212,175,106,.04), rgba(212,175,106,0));
    min-width: 70px; position:relative;
  }
  .cd::before, .cd::after{
    content:""; position:absolute; width:6px; height:6px; border:1px solid var(--gold);
  }
  .cd::before{top:-3px; left:-3px; border-right:none; border-bottom:none;}
  .cd::after{bottom:-3px; right:-3px; border-left:none; border-top:none;}
  .cd .num{font-family: var(--display); font-size: clamp(30px, 3.2vw, 44px); color: var(--gold-3); line-height: 1;}
  .cd .lbl{font-size: 10px; letter-spacing: .32em; text-transform: uppercase; color: var(--muted-2); margin-top: 8px;}

  /* ---------- section base ---------- */
  section.block{padding: 120px 0; position:relative;}
  section.block.tight{padding: 80px 0;}
  .section-head{text-align:center; max-width: 760px; margin: 0 auto 64px;}
  .section-head .eyebrow{margin-bottom: 22px;}
  .section-head p{margin-top: 22px; font-size: 17px;}

  /* ---------- about ---------- */
  .about{padding-bottom: 80px;}
  .about-grid{
    display:grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items:center;
  }
  @media (max-width: 900px){.about-grid{grid-template-columns:1fr; gap:40px;}}
  .about-grid .lead{
    font-family: var(--display); font-weight: 600;
    font-size: clamp(22px, 2.2vw, 30px); line-height: 1.35;
    color: var(--cream); letter-spacing: -.005em;
  }
  .about-grid .lead em{color: var(--gold); font-style: normal; font-weight: 800;}
  .about-grid p{font-size: 16px; margin-bottom: 18px;}
  .quote-mark{
    font-family: var(--display); font-size: 120px; line-height: .4; color: var(--gold);
    display:block; margin-bottom: 10px; opacity:.8;
  }
  .about-photo{
    position: relative; aspect-ratio: 4/5;
    border: 1px solid rgba(212,175,106,.2);
    background:
      repeating-linear-gradient(45deg, rgba(212,175,106,.05) 0 2px, transparent 2px 16px),
      linear-gradient(180deg, #0e0a12, #06040a);
    display:flex; align-items:center; justify-content:center;
  }
  .about-photo .ph{
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size:11px; letter-spacing:.2em; color: var(--muted-2);
    text-align:center;
    padding: 18px;
  }
  .about-photo .ph .big{color: var(--gold); display:block; font-size: 14px; margin-bottom:10px; letter-spacing: .4em;}

  /* ---------- diferenciais ---------- */
  .diff-grid{
    display:grid; grid-template-columns: repeat(4, 1fr); gap: 22px;
  }
  @media (max-width: 980px){.diff-grid{grid-template-columns: repeat(2, 1fr)}}
  @media (max-width: 540px){.diff-grid{grid-template-columns: 1fr}}
  .diff{
    position:relative;
    padding: 36px 26px 30px;
    border: 1px solid rgba(212,175,106,.18);
    background: linear-gradient(180deg, rgba(212,175,106,.04), rgba(212,175,106,0) 60%, rgba(212,175,106,.04));
    transition: transform .35s ease, border-color .35s ease, background .35s ease;
  }
  .diff:hover{transform: translateY(-6px); border-color: rgba(212,175,106,.5);}
  .diff .num{
    font-family: var(--display); font-weight:700; font-size: 12px;
    color: var(--gold); letter-spacing: .28em;
  }
  .diff .icon{
    width: 56px; height: 56px; margin: 18px 0 22px;
    display:flex; align-items:center; justify-content:center;
    color: var(--gold);
  }
  .diff .icon svg{width: 100%; height: 100%;}
  .diff h3{margin-bottom: 12px; color: var(--cream);}
  .diff p{font-size: 14.5px; line-height: 1.65; margin:0;}
  .diff::after{
    content:""; position:absolute; left:0; bottom:0; width: 0%; height:1px; background: var(--gold);
    transition: width .5s ease;
  }
  .diff:hover::after{width: 100%;}

  /* ---------- info card ---------- */
  .info-section{
    padding: 100px 0; position:relative;
    background:
      radial-gradient(800px 500px at 80% 30%, rgba(212,175,106,.08), transparent 70%);
  }
  .info-card{
    display:grid; grid-template-columns: 1.1fr .9fr; gap: 0;
    border: 1px solid rgba(212,175,106,.25);
    background: linear-gradient(180deg, rgba(20,14,24,.6), rgba(10,7,12,.6));
    backdrop-filter: blur(8px);
    position:relative; overflow:hidden;
  }
  @media (max-width: 900px){.info-card{grid-template-columns:1fr;}}
  .info-card::before{
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(300px 200px at 0% 0%, rgba(212,175,106,.15), transparent 70%),
      radial-gradient(300px 200px at 100% 100%, rgba(212,175,106,.12), transparent 70%);
    pointer-events:none;
  }
  .info-left{padding: 56px 56px;}
  @media (max-width: 700px){.info-left{padding: 36px 28px;}}
  .info-left h2{margin-bottom: 16px;}
  .info-left .lead{color: var(--muted); margin-bottom: 32px; max-width: 42ch;}

    max-width: 880px; margin: 0 auto;

  .rsvp-card .corner.tr{top:-1px; right:-1px; border-top:1px solid var(--gold); border-right:1px solid var(--gold);}
  .rsvp-card .corner.bl{bottom:-1px; left:-1px; border-bottom:1px solid var(--gold); border-left:1px solid var(--gold);}
  .rsvp-card .corner.br{bottom:-1px; right:-1px; border-bottom:1px solid var(--gold); border-right:1px solid var(--gold);}

  .rsvp-card h2{text-align:center; margin-bottom: 12px;}

  .rsvp-form{display:grid; grid-template-columns: 1fr 1fr; gap: 22px 24px;}
  @media (max-width: 600px){.rsvp-form{grid-template-columns:1fr;}}
  .field{display:flex; flex-direction:column; gap:8px;}
  .field.full{grid-column: 1 / -1;}
  .field label{font-size: 10.5px; letter-spacing:.34em; text-transform:uppercase; color: var(--gold);}
  .field input, .field select, .field textarea{
    font-family: var(--body); font-size: 15px; color: var(--cream);
    padding: 14px 16px;
    background: rgba(0,0,0,.35);
    border: 1px solid rgba(212,175,106,.25);
    transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    width: 100%;
  }
  .field textarea{min-height: 90px; resize: vertical;}
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none; border-color: var(--gold);
    background: rgba(0,0,0,.55);
    box-shadow: 0 0 0 4px rgba(212,175,106,.12);
  }
  .field input::placeholder, .field textarea::placeholder{color: var(--muted-2);}
  .field.error input, .field.error select{border-color: #c1565a;}
  .field .err{color:#e08488; font-size: 12px; min-height: 14px; letter-spacing:.04em;}

  .radio-row{display:flex; gap:10px; flex-wrap:wrap;}

    text-align:center; cursor:pointer;
    font-family: var(--body); font-size: 13px; color: var(--cream);
    background: rgba(0,0,0,.25);
    transition: all .2s ease;
  }
  .radio-row input{display:none;}
  .radio-row label:hover{border-color: var(--gold); color: var(--gold-3);}
  .radio-row input:checked + .lab{background: linear-gradient(180deg, var(--gold-3), var(--gold) 60%, var(--gold-2)); color:#0b070d; border-color: var(--gold);}
  .radio-row label .lab{display:block; padding: 14px 8px; margin: -14px -8px; border: 1px solid transparent;}

  .consent{display:flex; gap: 14px; align-items:flex-start; margin-top: 8px;}
  .consent input{width:18px; height:18px; margin-top:2px; accent-color: var(--gold);}
  .consent label{font-size: 12.5px; color: var(--muted); line-height: 1.55; text-transform: none; letter-spacing: normal;}
  .consent a{color: var(--gold); text-decoration:none; border-bottom: 1px dashed rgba(212,175,106,.5);}

  .submit-row{margin-top: 8px; display:flex; gap:18px; align-items:center; flex-wrap:wrap;}
  .submit-row .note{font-size:12px; color: var(--muted-2);}

  .rsvp-success{
    text-align:center; padding: 40px 10px 10px;
  }

    from{opacity:0; transform: scale(.6)}
    to{opacity:1; transform: scale(1)}

  footer{

  .foot-grid p{font-size: 13.5px; line-height: 1.7;}
  .foot-col h4{
    font-family: var(--body); font-size:11.5px; letter-spacing: .34em;
    text-transform:uppercase; color: var(--gold); margin: 6px 0 18px;

    width: 40px; height:40px; border:1px solid rgba(212,175,106,.3);

    color: var(--gold); transition: all .25s ease;
  }
  .socials a:hover{background: var(--gold); color: #0b070d; border-color: var(--gold);}

  .foot-bottom{
    border-top: 1px solid var(--ink-line);
    padding-top: 28px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px;
    font-size: 12px; color: var(--muted-2);
  }
  .foot-bottom a{color: var(--muted-2); text-decoration:none;}
  .foot-bottom a:hover{color: var(--gold);}

  /* ---------- particles bg ---------- */
  .global-particles{position: fixed; inset:0; pointer-events:none; z-index:0; opacity:.35;}

  /* ---------- floating WhatsApp ---------- */
  .float-wa{
    position: fixed; right: 22px; bottom: 22px; z-index: 60;
    width: 56px; height: 56px;
    background: linear-gradient(180deg, var(--gold-3), var(--gold) 55%, var(--gold-2));
    color: #0b070d; display:flex; align-items:center; justify-content:center;
    text-decoration:none; box-shadow: 0 14px 30px rgba(212,175,106,.4), inset 0 1px 0 rgba(255,255,255,.5);
    transition: transform .25s ease;
  }
  .float-wa:hover{transform: translateY(-3px) scale(1.06);}
  .float-wa svg{width:26px; height: 26px;}

  /* prevent FOUC */
  #app:empty{min-height: 100vh}

  /* ---------- RSVP — spotlight dourado ---------- */
  .rsvp{
    background:
      radial-gradient(900px 600px at 50% 42%, rgba(212,175,106,.32), rgba(212,175,106,.12) 35%, transparent 65%),
      radial-gradient(1200px 800px at 50% 10%, rgba(212,175,106,.14), transparent 60%);
  }
  .rsvp-card{
    background: linear-gradient(180deg, rgba(22,15,28,.92), rgba(10,7,14,.94));
    border: 2px solid var(--gold);
    backdrop-filter: blur(10px);
    box-shadow:
      0 0 0 1px rgba(212,175,106,.18),
      0 0 60px rgba(212,175,106,.28),
      0 30px 90px rgba(0,0,0,.55),
      inset 0 1px 0 rgba(255,255,255,.04);
  }
  .rsvp-card::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(60% 40% at 50% 0%, rgba(212,175,106,.16), transparent 70%),
      radial-gradient(80% 60% at 100% 100%, rgba(212,175,106,.08), transparent 70%);
  }
  .rsvp-card .corner{ width: 34px; height: 34px; }
  .rsvp-card .corner.tl{ top:-2px; left:-2px; border-top:2px solid var(--gold-3); border-left:2px solid var(--gold-3); }
  .rsvp-card .corner.tr{ top:-2px; right:-2px; border-top:2px solid var(--gold-3); border-right:2px solid var(--gold-3); }
  .rsvp-card .corner.bl{ bottom:-2px; left:-2px; border-bottom:2px solid var(--gold-3); border-left:2px solid var(--gold-3); }
  .rsvp-card .corner.br{ bottom:-2px; right:-2px; border-bottom:2px solid var(--gold-3); border-right:2px solid var(--gold-3); }

  .nav-actions{ display:flex; align-items:center; gap:12px; }

  }

  @media (max-width: 720px){
    .wrap{ padding: 0 22px; }

    /* spacing reset for mobile */
    section.block{ padding: 72px 0; }

    .info-section{ padding: 64px 0; }
    .rsvp{ padding: 72px 0; }
    .about{ padding-bottom: 40px; }
    footer{ padding: 56px 0 32px; }

    /* hero — altura flexível e CTA cheia */
    .hero{ height:auto; max-height:none; min-height: 540px; padding: 36px 0 48px; }
    .hero-left{ padding: 0 22px; }
    .hero-content{ max-width:100%; }
    .hero-sub{ font-size: 15px; margin-bottom: 28px; }

    .field input, .field select, .field textarea{ font-size: 16px; }

    .radio-row{ flex-direction: column; gap: 10px; }

    /* CTA do form — largura total */
    .submit-row{ flex-direction: column; align-items: stretch; gap: 14px; }
    .submit-row .btn.primary{ width: 100%; justify-content: center; }
    .submit-row .note{ text-align: center; }

    /* map address */
    .map-address{
      flex-wrap: wrap; gap: 12px;
      left: 16px; right: 16px; bottom: 16px;
      padding: 14px 16px;
    }
    .map-address a{ width:100%; text-align:center; padding: 12px 14px; }

    /* differentials */
    .diff{ padding: 30px 22px 26px; }
  }

  @media (max-width: 720px){
    .hero-eyebrow{ display:none; }
    .hero-headline{ font-size: 38px; line-height: 1.08; }
  }

  @media (max-width: 480px){
    nav.top .inner{ height: 64px; }
    .brand img{ height: 36px; }
    .nav-links{ top: 64px; }
    .hero-headline{ font-size: 32px; }
    .float-wa{ width: 50px; height: 50px; right: 16px; bottom: 16px; }
    .float-wa svg{ width: 22px; height: 22px; }
  }

</style>

/* ============ Sparkles ============ */
function Sparkles({count=22, area=null}){
  const items = useMemo(() => Array.from({length: count}).map((_,i) => ({
    left: Math.random()*100,
    top: Math.random()*100,
    delay: Math.random()*4,
    size: 1 + Math.random()*3,
  })), [count]);
  return (
    <div className="sparkles" aria-hidden="true">
      {items.map((s,i) => (
        <div key={i} className="sparkle" style={{
          left: s.left+"%", top: s.top+"%",
          animationDelay: s.delay+"s",
          width: s.size+"px", height: s.size+"px",
        }}/>
      ))}
    </div>
  );
}

/* ============ Countdown ============ */
function Countdown({ target }){
  const [now, setNow] = useState(() => Date.now());
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);
  let diff = Math.max(0, target - now);
  const days = Math.floor(diff/86400000); diff -= days*86400000;
  const hours = Math.floor(diff/3600000); diff -= hours*3600000;
  const mins = Math.floor(diff/60000); diff -= mins*60000;
  const secs = Math.floor(diff/1000);
  const pad = (n) => String(n).padStart(2,"0");
  return (
    <div className="countdown" aria-label="Contagem regressiva">
      <div className="cd"><div className="num">{pad(days)}</div><div className="lbl">Dias</div></div>
      <div className="cd"><div className="num">{pad(hours)}</div><div className="lbl">Horas</div></div>
      <div className="cd"><div className="num">{pad(mins)}</div><div className="lbl">Min</div></div>
      <div className="cd"><div className="num">{pad(secs)}</div><div className="lbl">Seg</div></div>
    </div>
  );
}

/* ============ RSVP Form ============ */
function RSVP(){
  const [form, setForm] = useState({
    nome:"", email:"", telefone:"", acompanhantes:"0",
    interesse:"15 anos", obs:"", consent:false,
  });
  const [errors, setErrors] = useState({});
  const [sent, setSent] = useState(false);

  const set = (k,v) => setForm(f => ({...f, [k]: v}));

  const formatPhone = (val) => {
    const d = val.replace(/\D/g,"").slice(0,11);
    if (d.length <= 2) return d.length ? `(${d}` : "";
    if (d.length <= 6) return `(${d.slice(0,2)}) ${d.slice(2)}`;
    if (d.length <= 10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
    return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
  };

  const validate = () => {
    const e = {};
    if (!form.nome.trim() || form.nome.trim().length < 3) e.nome = "Informe seu nome completo.";
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = "E-mail inválido.";
    const digits = form.telefone.replace(/\D/g,"");
    if (digits.length < 10) e.telefone = "Telefone/WhatsApp inválido.";
    if (!form.consent) e.consent = "Necessário aceitar os termos.";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const submit = (ev) => {
    ev.preventDefault();
    if (!validate()) return;
    setSent(true);
    // scroll into view smoothly
    setTimeout(() => {
      document.getElementById("rsvp")?.scrollIntoView({behavior:"smooth", block:"start"});
    }, 50);
  };

  if (sent){
    return (

                  Falar no WhatsApp
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>
    );
  }

  return (
    <section className="rsvp" id="rsvp">
      <Sparkles count={24}/>
      <div className="wrap">
        <div className="section-head">
          <div className="eyebrow">Confirmação de presença</div>

          <p>São vagas limitadas. Preencha os dados abaixo e nossa equipe enviará a confirmação com todos os detalhes.</p>
        </div>

        <div className="rsvp-card">
          <span className="corner tl"/><span className="corner tr"/><span className="corner bl"/><span className="corner br"/>

          <form className="rsvp-form" onSubmit={submit} noValidate>
            <div className={"field" + (errors.nome ? " error" : "")}>
              <label htmlFor="f-nome">Nome completo</label>
              <input id="f-nome" type="text" autoComplete="name" placeholder="Como você quer ser chamado(a)"
                value={form.nome} onChange={e=>set("nome", e.target.value)}/>

            <div className={"field" + (errors.email ? " error" : "")}>

              <input id="f-email" type="email" autoComplete="email" placeholder="seu@email.com"
                value={form.email} onChange={e=>set("email", e.target.value)}/>
              <div className="err">{errors.email || ""}</div>
            </div>

            <div className={"field" + (errors.telefone ? " error" : "")}>
              <label htmlFor="f-tel">Telefone / WhatsApp</label>
              <input id="f-tel" type="tel" inputMode="tel" autoComplete="tel" placeholder="(51) 99999-9999"
                value={form.telefone} onChange={e=>set("telefone", formatPhone(e.target.value))}/>

/* ============ Global background particles ============ */
function GlobalParticles(){
  useEffect(() => {
    const el = document.getElementById("bg-particles");
    if (!el || el.childElementCount) return;
    const n = 60;
    for (let i=0;i<n;i++){
      const d = document.createElement("div");
      d.className = "sparkle";
      d.style.position = "absolute";
      d.style.left = Math.random()*100 + "%";
      d.style.top = Math.random()*100 + "%";
      d.style.animationDelay = (Math.random()*4) + "s";
      d.style.width = d.style.height = (1 + Math.random()*2.5) + "px";
      el.appendChild(d);
    }
  }, []);
  return null;
}

/* ============ App root ============ */
function App(){
  return (
    <React.Fragment>
      <GlobalParticles/>
      <TopNav/>
      <Hero/>
      <About/>
      <Differentials/>
      <EventInfo/>
      <RSVP/>
      <Footer/>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
